name: Playwright Table Scraper

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape tables - 21f2000153@ds.study.iitm.ac.in
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps
          node -e "
          const { chromium } = require('playwright');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            // Debug: check what the page looks like
            await page.goto('https://sanand0.github.io/tdsdata/table/?seed=84', { waitUntil: 'domcontentloaded' });
            await page.waitForTimeout(5000);
            const html = await page.content();
            console.log('PAGE HTML:', html.substring(0, 2000));

            await browser.close();
          })();
          "
